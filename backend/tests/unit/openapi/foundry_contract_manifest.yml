version: 1

# Minimal Foundry contract manifest used by unit tests to enforce:
# - endpoint path + method existence
# - parameter names + required flags (path + query)
# - required OAuth scopes (enforced via shared.foundry.auth.require_scopes metadata)
#
# Add additional endpoints here as parity work progresses.

