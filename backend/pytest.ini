[pytest]
testpaths = tests
pythonpath = .
addopts =
    -v
    --strict-markers
    --strict-config
    --tb=short
filterwarnings =
    ignore:.*utcnow\(\) is deprecated.*:DeprecationWarning:botocore\..*
    ignore:.*utcnow\(\) is deprecated.*:DeprecationWarning:openpyxl\..*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    requires_infra: tests that need local stack services (Postgres/Redis/MinIO)
    performance: marks tests as performance tests
    chaos: chaos/idempotency contract tests
    smoke: marks tests as basic service health and connectivity tests (fast, ~30s)
    workflow: marks tests as end-to-end user workflow tests (medium, ~2-5min each)
    redis_boundary: live Redis integration boundary tests
    postgres_boundary: live Postgres integration boundary tests
    lakefs_boundary: live lakeFS integration boundary tests
    kafka_boundary: live Kafka integration boundary tests
    s3_boundary: live S3/MinIO integration boundary tests
asyncio_mode = auto
