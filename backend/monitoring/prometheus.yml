global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector Prometheus exporter (aggregated OTLP metrics)
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Direct Prometheus scrape for FastAPI /metrics (prometheus-client)
  - job_name: spice-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - "bff:8002"
          - "oms:8000"
          - "funnel:8003"
          - "agent:8004"

