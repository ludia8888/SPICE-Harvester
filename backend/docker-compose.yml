      - LAKEFS_SECRET_ACCESS_KEY=${LAKEFS_SECRET_ACCESS_KEY:-spice-lakefs-admin-secret}
      - LAKEFS_SERVICE_PRINCIPAL=writeback-materializer-worker
      # Worker tuning (no-op when DB_NAMES is empty)
      - WRITEBACK_MATERIALIZER_BASE_BRANCH=${WRITEBACK_MATERIALIZER_BASE_BRANCH:-main}
      - WRITEBACK_MATERIALIZER_INTERVAL_SECONDS=${WRITEBACK_MATERIALIZER_INTERVAL_SECONDS:-21600}
      - WRITEBACK_MATERIALIZER_RUN_ONCE=${WRITEBACK_MATERIALIZER_RUN_ONCE:-false}
      - WRITEBACK_MATERIALIZER_DB_NAMES=${WRITEBACK_MATERIALIZER_DB_NAMES:-}
      - LOG_LEVEL=INFO
      - DOCKER_CONTAINER=true
    depends_on:
      - minio
      - lakefs
    networks:
      - spice_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:
  bff_data:

networks:
  spice_network:
    driver: bridge
