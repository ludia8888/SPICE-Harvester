      - ONTOLOGY_COMMANDS_DLQ_TOPIC=${ONTOLOGY_COMMANDS_DLQ_TOPIC:-ontology-commands-dlq}
      - LOG_LEVEL=INFO
      - DOCKER_CONTAINER=true
    depends_on:
