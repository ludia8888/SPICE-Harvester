services:
  # PostgreSQL - 표준화된 인증 정보
  postgres:
    image: postgres:16-alpine
    container_name: spice_postgres
    # Running the full stack (services + workers) can open many connections.
    # Increase max_connections for local/dev + integration test stability.
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-spiceadmin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spicepass123}
      - POSTGRES_DB=${POSTGRES_DB:-spicedb}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - spice_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spiceadmin} -d ${POSTGRES_DB:-spicedb}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Postgres migrations (idempotent, tracked in schema_migrations)
  db-migrations:
    image: postgres:16-alpine
    container_name: spice_db_migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-spiceadmin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spicepass123}
      - POSTGRES_DB=${POSTGRES_DB:-spicedb}
    volumes:
      - ./database/migrations:/migrations:ro
      - ./database/migrate/apply_migrations.sh:/apply_migrations.sh:ro
    entrypoint: ["sh", "-c", "cat /apply_migrations.sh | sh"]
    restart: "no"
    networks:
      - spice_network

  # Redis - 표준화된 인증 정보
  redis:
    image: redis:7-alpine
    container_name: spice_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-spicepass123}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - spice_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-spicepass123} ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Elasticsearch - 표준화된 인증 정보
  elasticsearch:
    # NOTE: 8.13.x bundles JDK 22 which is unstable on some ARM hosts (SIGILL).
    # Pin to 8.12.x (JDK 21) for deterministic local/dev runs.
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: spice_elasticsearch
    # On Apple Silicon / some ARM hypervisors, the bundled JDK can SIGILL at JVM bootstrap.
    # Force the amd64 image for stable local/dev runs (Docker will emulate if needed).
    # Override with ELASTICSEARCH_PLATFORM=linux/arm64 if emulation is too slow.
    platform: ${ELASTICSEARCH_PLATFORM:-linux/amd64}
    environment:
      - discovery.type=single-node
      # Dev/test only: keep ES lightweight but stable.
      # NOTE: 128m heap is often too small for the full production gate (many indices), causing shard recovery stalls.
      - xpack.ml.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - bootstrap.memory_lock=true
      # NOTE: For the full production gate, prefer >=512m heap. Override via `ES_JAVA_OPTS`.
      - "ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}"
      - http.host=0.0.0.0
    ulimits:
      memlock:
        soft: -1
        hard: -1
    expose:
      - "9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - spice_network
    healthcheck:
      # Elasticsearch can take a few minutes to bootstrap on slower hosts (e.g. emulated amd64).
      # Mark healthy only once the cluster is at least yellow to avoid false-negatives.
      test:
        [
          "CMD-SHELL",
          "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' > /dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 240s
    restart: unless-stopped

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: spice_kafka
    environment:
      KAFKA_BROKER_ID: 1
      # Dev/test: keep Kafka lightweight to avoid Docker Desktop OOM kills during full E2E runs.
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Use 127.0.0.1 instead of localhost to avoid IPv6 (::1) bootstrap issues on some hosts/CI runners.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://127.0.0.1:${KAFKA_PORT_HOST:-39092}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    expose:
      - "9092"
      - "29092"
    depends_on:
      - zookeeper
    networks:
      - spice_network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: spice_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    expose:
      - "2181"
    networks:
      - spice_network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO - 표준화된 인증 정보
  minio:
    image: minio/minio:latest
    container_name: spice_minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin123}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    networks:
      spice_network:
        aliases:
          - spice-minio
          - spice_minio
    command: server /data --console-address ":9001"
    healthcheck:
      # MinIO image doesn't ship with curl; use bash TCP check.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9000'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # lakeFS (data versioning + S3 gateway)
  lakefs:
    image: treeverse/lakefs:latest
    container_name: spice_lakefs
    depends_on:
      - postgres
      - minio
    restart: unless-stopped
    environment:
      # Server
      - LAKEFS_LISTEN_ADDRESS=0.0.0.0:8000
      # Auth bootstrap (deterministic for local/dev)
      - LAKEFS_AUTH_ENCRYPT_SECRET_KEY=${LAKEFS_AUTH_ENCRYPT_SECRET_KEY:-notsecretnotsecretnotsecretnotse}
      - LAKEFS_INSTALLATION_USER_NAME=${LAKEFS_INSTALLATION_USER_NAME:-spice-admin}
      # Use docker-specific env vars to avoid accidentally reusing real AWS keys from host `.env`.
      - LAKEFS_INSTALLATION_ACCESS_KEY_ID=${LAKEFS_DOCKER_ACCESS_KEY_ID:-spice-lakefs-admin}
      - LAKEFS_INSTALLATION_SECRET_ACCESS_KEY=${LAKEFS_DOCKER_SECRET_ACCESS_KEY:-spice-lakefs-admin-secret}
      # Metadata DB
      - LAKEFS_DATABASE_TYPE=postgres
      - LAKEFS_DATABASE_POSTGRES_CONNECTION_STRING=postgres://${POSTGRES_USER:-spiceadmin}:${POSTGRES_PASSWORD:-spicepass123}@postgres:5432/${POSTGRES_DB:-spicedb}?sslmode=disable
      # Blockstore (MinIO S3)
      - LAKEFS_BLOCKSTORE_TYPE=s3
      - LAKEFS_BLOCKSTORE_S3_ENDPOINT=http://minio:9000
      - LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE=true
      - LAKEFS_BLOCKSTORE_S3_REGION=us-east-1
      - LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY:-minioadmin}
      - LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY:-minioadmin123}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8000/api/v1/healthcheck >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - spice_network

  # MinIO init (create buckets required by lakeFS and app services)
  minio-init:
    image: minio/mc:latest
    container_name: spice_minio_init
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        until /usr/bin/mc alias set local http://minio:9000 "${MINIO_ACCESS_KEY:-minioadmin}" "${MINIO_SECRET_KEY:-minioadmin123}" 2>/dev/null; do sleep 1; done
        /usr/bin/mc mb -p local/lakefs || true
        /usr/bin/mc mb -p local/${EVENT_STORE_BUCKET:-spice-event-store} || true
        /usr/bin/mc mb -p local/${INSTANCE_BUCKET:-instance-events} || true
        /usr/bin/mc mb -p local/${DATASET_ARTIFACTS_BUCKET:-dataset-artifacts} || true
        exit 0
    restart: "no"
    networks:
      - spice_network

  # lakeFS init (create required repositories)
  lakefs-init:
    image: curlimages/curl:8.5.0
    container_name: spice_lakefs_init
    depends_on:
      - lakefs
      - minio-init
    environment:
      - LAKEFS_INSTALLATION_USER_NAME=${LAKEFS_INSTALLATION_USER_NAME:-spice-admin}
      - LAKEFS_INSTALLATION_ACCESS_KEY_ID=${LAKEFS_DOCKER_ACCESS_KEY_ID:-spice-lakefs-admin}
      - LAKEFS_INSTALLATION_SECRET_ACCESS_KEY=${LAKEFS_DOCKER_SECRET_ACCESS_KEY:-spice-lakefs-admin-secret}
      - LAKEFS_ARTIFACTS_REPOSITORY=${LAKEFS_ARTIFACTS_REPOSITORY:-pipeline-artifacts}
      - LAKEFS_RAW_REPOSITORY=${LAKEFS_RAW_REPOSITORY:-raw-datasets}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        echo "Waiting for lakeFS..."
        until curl -fsS http://lakefs:8000/api/v1/healthcheck >/dev/null 2>&1; do sleep 1; done
        echo "Checking lakeFS setup state..."
        state="$(curl -fsS http://lakefs:8000/api/v1/setup_lakefs || true)"
        if echo "$$state" | grep -q "not_initialized"; then
          echo "Bootstrapping lakeFS admin user..."
          username="$${LAKEFS_INSTALLATION_USER_NAME:-spice-admin}"
          auth_user="$${LAKEFS_INSTALLATION_ACCESS_KEY_ID:-spice-lakefs-admin}"
          auth_pass="$${LAKEFS_INSTALLATION_SECRET_ACCESS_KEY:-spice-lakefs-admin-secret}"
          curl -fsS -X POST http://lakefs:8000/api/v1/setup_lakefs \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"$$username\",\"key\":{\"access_key_id\":\"$$auth_user\",\"secret_access_key\":\"$$auth_pass\"}}" >/dev/null
          # Optional comm prefs (ignore if state doesn't require it)
          curl -fsS -X POST http://lakefs:8000/api/v1/setup_comm_prefs \
            -H 'Content-Type: application/json' \
            -d '{"featureUpdates":false,"securityUpdates":false}' >/dev/null 2>&1 || true
        fi
        echo "Ensuring repositories..."
        auth_user="$${LAKEFS_INSTALLATION_ACCESS_KEY_ID:-spice-lakefs-admin}"
        auth_pass="$${LAKEFS_INSTALLATION_SECRET_ACCESS_KEY:-spice-lakefs-admin-secret}"
        create_repo() {
          name="$1"
          ns="$2"
          code="$$(curl -sS -o /dev/null -w '%{http_code}' -u "$$auth_user:$$auth_pass" -X POST http://lakefs:8000/api/v1/repositories \
            -H 'Content-Type: application/json' \
            -d "{\"name\":\"$$name\",\"storage_namespace\":\"$$ns\",\"default_branch\":\"main\"}")"
          if [ "$$code" != "201" ] && [ "$$code" != "409" ]; then
            echo "Failed to create repo $$name (http=$$code)"
            exit 1
          fi
        }
        create_repo "$${LAKEFS_ARTIFACTS_REPOSITORY:-pipeline-artifacts}" "s3://lakefs/$${LAKEFS_ARTIFACTS_REPOSITORY:-pipeline-artifacts}"
        create_repo "$${LAKEFS_RAW_REPOSITORY:-raw-datasets}" "s3://lakefs/$${LAKEFS_RAW_REPOSITORY:-raw-datasets}"
        create_repo "ontology-writeback" "s3://lakefs/ontology-writeback"
        echo "lakeFS repositories ready."
        exit 0
    restart: "no"
    networks:
      - spice_network

  # OMS (Ontology Management Service) - 표준화된 인증 정보
  oms:
    build:
      context: .
      dockerfile: ./oms/Dockerfile
    container_name: spice_oms
    environment:
      # Foundry-style ontology resource backend
      - ONTOLOGY_RESOURCE_STORAGE_BACKEND=${ONTOLOGY_RESOURCE_STORAGE_BACKEND:-postgres}
      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-spiceadmin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spicepass123}
      - POSTGRES_DB=${POSTGRES_DB:-spicedb}
      # Kafka
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-spicepass123}
      # Elasticsearch
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME:-}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-}
      # Event Store (S3/MinIO)
      - MINIO_ENDPOINT_URL=http://spice-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - EVENT_STORE_BUCKET=${EVENT_STORE_BUCKET:-spice-event-store}
      # lakeFS (versioned storage + S3 gateway)
      - LAKEFS_API_URL=http://lakefs:8000
      - LAKEFS_S3_ENDPOINT_URL=http://lakefs:8000
      - LAKEFS_ACCESS_KEY_ID=${LAKEFS_DOCKER_ACCESS_KEY_ID:-spice-lakefs-admin}
      - LAKEFS_SECRET_ACCESS_KEY=${LAKEFS_DOCKER_SECRET_ACCESS_KEY:-spice-lakefs-admin-secret}
      # Service
      - LOG_LEVEL=INFO
      - DOCKER_CONTAINER=true
      - OMS_REQUIRE_AUTH=${OMS_REQUIRE_AUTH:-true}
      # Dev convenience: allow treating all requests as master when enabled (development only).
      - DEV_MASTER_AUTH_ENABLED=${DEV_MASTER_AUTH_ENABLED:-false}
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      - OMS_GRPC_ENABLED=${OMS_GRPC_ENABLED:-true}
      - OMS_GRPC_PORT=${OMS_GRPC_PORT:-50051}
      - OMS_GRPC_BIND_HOST=0.0.0.0
      - OMS_GRPC_SERVER_USE_TLS=${OMS_GRPC_SERVER_USE_TLS:-false}
      - OMS_GRPC_REQUIRE_MTLS=${OMS_GRPC_REQUIRE_MTLS:-false}
      - OMS_GRPC_SERVICE_TOKENS=${OMS_GRPC_SERVICE_TOKENS:-${ADMIN_TOKEN},${BFF_AGENT_TOKEN:-spice-dev-agent-token}}
      # Dev-stack default: allow direct writes on protected branches (smoke/E2E tests + README flow).
      # Set to true in environments that require proposal workflow on protected branches (main/prod).
      - ONTOLOGY_REQUIRE_PROPOSALS=${ONTOLOGY_REQUIRE_PROPOSALS:-false}
    depends_on:
      db-migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - spice_network
    expose:
      - "8000"
      - "50051"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # BFF
  bff:
    build:
      context: .
      dockerfile: ./bff/Dockerfile
    container_name: spice_bff
    environment:
      - OMS_GRPC_TARGET=${OMS_GRPC_TARGET:-oms:50051}
      - OMS_CLIENT_TIMEOUT_SECONDS=${OMS_CLIENT_TIMEOUT_SECONDS:-60}
      - AGENT_BASE_URL=http://agent:8004
      - AGENT_PROXY_TIMEOUT_SECONDS=${AGENT_PROXY_TIMEOUT_SECONDS:-300}
      - BFF_AGENT_TOKEN=${BFF_AGENT_TOKEN:-spice-dev-agent-token}
      - MCP_CONFIG_PATH=/app/mcp-config.json
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY:-}
      - CONTEXT7_WORKSPACE=${CONTEXT7_WORKSPACE:-}
      # End-user JWT (Agent Sessions)
      - USER_JWT_ENABLED=${USER_JWT_ENABLED:-true}
      - USER_JWT_HS256_SECRET=${USER_JWT_HS256_SECRET:-spice-dev-user-jwt-secret}
      - USER_JWT_ISSUER=${USER_JWT_ISSUER:-}
      - USER_JWT_AUDIENCE=${USER_JWT_AUDIENCE:-}
      - USER_JWT_ALGORITHMS=${USER_JWT_ALGORITHMS:-}
      # Agent tool allowlist bootstrap (safe: only_if_empty by default)
      - AGENT_PLAN_ALLOWLIST_BOOTSTRAP_ENABLED=${AGENT_PLAN_ALLOWLIST_BOOTSTRAP_ENABLED:-true}
      - AGENT_PLAN_ALLOWLIST_BOOTSTRAP_ONLY_IF_EMPTY=${AGENT_PLAN_ALLOWLIST_BOOTSTRAP_ONLY_IF_EMPTY:-true}
      - AGENT_PLAN_ALLOWLIST_BUNDLE_PATH=${AGENT_PLAN_ALLOWLIST_BUNDLE_PATH:-}
      # LLM gateway (planner). Default: OpenAI-compatible (set LLM_API_KEY; OPENAI_API_KEY is a compatibility alias).
      # To disable LLM features: set LLM_PROVIDER=disabled.
      - LLM_PROVIDER=${LLM_PROVIDER:-openai_compat}
      - LLM_MODEL=${LLM_MODEL:-${OPENAI_MODEL:-gpt-5}}
      - LLM_BASE_URL=${LLM_BASE_URL:-${OPENAI_BASE_URL:-${OPENAI_API_BASE:-https://api.openai.com/v1}}}
      - LLM_API_KEY=${LLM_API_KEY:-${OPENAI_API_KEY:-}}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2000}
      - LLM_MAX_PROMPT_CHARS=${LLM_MAX_PROMPT_CHARS:-0}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-60}
      - LLM_NATIVE_TOOL_CALLING=${LLM_NATIVE_TOOL_CALLING:-true}
      - LLM_MOCK_JSON=${LLM_MOCK_JSON:-}
      - LLM_MOCK_JSON_AGENT_PLAN_COMPILE_V1=${LLM_MOCK_JSON_AGENT_PLAN_COMPILE_V1:-}
      - LLM_MOCK_JSON_AGENT_PLAN_CLARIFY_V1=${LLM_MOCK_JSON_AGENT_PLAN_CLARIFY_V1:-}
      - LLM_MOCK_DIR=${LLM_MOCK_DIR:-/app/llm_mocks}
      - PIPELINE_PLAN_LLM_ENABLED=${PIPELINE_PLAN_LLM_ENABLED:-true}
      # Infra (needed for WebSocket notifications / search / rate limiting)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-spiceadmin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spicepass123}
      - POSTGRES_DB=${POSTGRES_DB:-spicedb}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-spicepass123}
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME:-}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-}
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
      - OBJECTIFY_JOBS_TOPIC=${OBJECTIFY_JOBS_TOPIC:-objectify-jobs}
      - ENABLE_OBJECTIFY_OUTBOX_WORKER=true
      - OBJECTIFY_OUTBOX_POLL_SECONDS=5
      - OBJECTIFY_OUTBOX_BATCH=50
      - OBJECTIFY_OUTBOX_FLUSH_TIMEOUT_SECONDS=10
      - OBJECTIFY_OUTBOX_BACKOFF_BASE_SECONDS=2
      - OBJECTIFY_OUTBOX_BACKOFF_MAX_SECONDS=60
      - OBJECTIFY_OUTBOX_CLAIM_TIMEOUT_SECONDS=300
      - OBJECTIFY_OUTBOX_MAX_IN_FLIGHT=5
      - OBJECTIFY_OUTBOX_RETRIES=5
      - OBJECTIFY_OUTBOX_DELIVERY_TIMEOUT_MS=120000
      - OBJECTIFY_OUTBOX_REQUEST_TIMEOUT_MS=30000
      - OBJECTIFY_OUTBOX_PURGE_INTERVAL_SECONDS=3600
      - OBJECTIFY_OUTBOX_RETENTION_DAYS=7
      - OBJECTIFY_OUTBOX_PURGE_LIMIT=10000
      - ENABLE_OBJECTIFY_RECONCILER=true
      - OBJECTIFY_RECONCILER_POLL_SECONDS=60
      - OBJECTIFY_RECONCILER_STALE_SECONDS=600
      - OBJECTIFY_RECONCILER_ENQUEUED_STALE_SECONDS=900
      - OBJECTIFY_RECONCILER_LOCK_KEY=910215
      - LOG_LEVEL=INFO
      - DOCKER_CONTAINER=true
      - BFF_REQUIRE_AUTH=${BFF_REQUIRE_AUTH:-true}
      - BFF_REQUIRE_DB_SCOPE=${BFF_REQUIRE_DB_SCOPE:-false}
      - ENABLE_DATASET_INGEST_RECONCILER=false
      # Dev convenience: allow treating all requests as master when enabled (development only).
      - DEV_MASTER_AUTH_ENABLED=${DEV_MASTER_AUTH_ENABLED:-false}
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      # Event Store / Dataset artifacts (S3/MinIO)
      - MINIO_ENDPOINT_URL=http://spice-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - EVENT_STORE_IDEMPOTENCY_MISMATCH_MODE=${EVENT_STORE_IDEMPOTENCY_MISMATCH_MODE:-warn}
      - PIPELINE_JOB_QUEUE_FLUSH_TIMEOUT_SECONDS=${PIPELINE_JOB_QUEUE_FLUSH_TIMEOUT_SECONDS:-30}
      - ONTOLOGY_REQUIRE_PROPOSALS=${ONTOLOGY_REQUIRE_PROPOSALS:-false}
      # lakeFS (versioned storage + S3 gateway)
      - LAKEFS_API_URL=http://lakefs:8000
      - LAKEFS_S3_ENDPOINT_URL=http://lakefs:8000
      - LAKEFS_ACCESS_KEY_ID=${LAKEFS_DOCKER_ACCESS_KEY_ID:-spice-lakefs-admin}
      - LAKEFS_SECRET_ACCESS_KEY=${LAKEFS_DOCKER_SECRET_ACCESS_KEY:-spice-lakefs-admin-secret}
      - LAKEFS_ARTIFACTS_REPOSITORY=${LAKEFS_ARTIFACTS_REPOSITORY:-pipeline-artifacts}
      - LAKEFS_RAW_REPOSITORY=${LAKEFS_RAW_REPOSITORY:-raw-datasets}
      - LAKEFS_CREDENTIALS_SOURCE=${LAKEFS_CREDENTIALS_SOURCE:-env}
      - LAKEFS_CREDENTIALS_ENCRYPTION_KEY=${LAKEFS_CREDENTIALS_ENCRYPTION_KEY:-WCgHDn1AOcBzLOuW2zM8kSTFocoQmT07kkgHCFc8qtM=}
      - LAKEFS_SERVICE_PRINCIPAL=bff
    depends_on:
      db-migrations:
        condition: service_completed_successfully
      oms:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      lakefs:
        condition: service_healthy
    ports:
      - "8002:8002"
    networks:
      - spice_network
    volumes:
      - bff_data:/app/data
      # Use a container-safe MCP config (the repo-root mcp-config.json contains host absolute paths).
      - ./mcp_servers/mcp-config.docker.json:/app/mcp-config.json:ro
      - ../scripts/llm_mocks:/app/llm_mocks:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Agent Service (tool runner).
  #
  # NOTE: Pipeline Agent runs are primarily handled in the BFF now
  # (/api/v1/agent/pipeline-runs + /stream), but we keep this service for
  # compatibility (health checks, prior-flow support, and production gate expectations).
  agent:
    build:
      context: .
      dockerfile: ./agent/Dockerfile
    container_name: spice_agent
    environment:
      - AGENT_BFF_BASE_URL=http://bff:8002
      - AGENT_REQUIRE_EVENT_STORE=true
      - AGENT_SERVICE_NAME=agent
      - AGENT_TOOL_TIMEOUT_SECONDS=180
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-spiceadmin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spicepass123}
      - POSTGRES_DB=${POSTGRES_DB:-spicedb}
      - MINIO_ENDPOINT_URL=http://spice-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - EVENT_STORE_BUCKET=${AGENT_EVENT_STORE_BUCKET:-spice-agent-store}
      - AGENT_BFF_TOKEN=${BFF_AGENT_TOKEN:-spice-dev-agent-token}
      - LOG_LEVEL=INFO
      - DOCKER_CONTAINER=true
    depends_on:
      - bff
      - postgres
      - minio
    networks:
      - spice_network
    expose:
      - "8004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Connector Trigger Service (polls + emits connector-updates)
  connector-trigger-service:
    build:
      context: .
      dockerfile: ./connector_trigger_service/Dockerfile
    container_name: spice_connector_trigger_service
    environment:
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-spiceadmin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spicepass123}
      - POSTGRES_DB=${POSTGRES_DB:-spicedb}
      - LOG_LEVEL=INFO
      - DOCKER_CONTAINER=true
      - CONNECTOR_UPDATES_TOPIC=connector-updates
      - CONNECTOR_TRIGGER_SOURCE_TYPE=google_sheets
      - CONNECTOR_TRIGGER_TICK_SECONDS=5
      - CONNECTOR_TRIGGER_POLL_CONCURRENCY=5
      # Optional (public sheets work without it)
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    depends_on:
      - kafka
