      - BFF_BASE_URL=http://bff:8002
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      - LOG_LEVEL=INFO
      - DOCKER_CONTAINER=true
      - CONNECTOR_UPDATES_TOPIC=connector-updates
      - CONNECTOR_UPDATES_DLQ_TOPIC=connector-updates-dlq
