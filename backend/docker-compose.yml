      - LAKEFS_API_URL=http://lakefs:8000
      - LAKEFS_S3_ENDPOINT_URL=http://lakefs:8000
      - LAKEFS_ACCESS_KEY_ID=${LAKEFS_ACCESS_KEY_ID:-spice-lakefs-admin}
      - LAKEFS_SECRET_ACCESS_KEY=${LAKEFS_SECRET_ACCESS_KEY:-spice-lakefs-admin-secret}
      - LAKEFS_SERVICE_PRINCIPAL=action-outbox-worker
      # Correctness/ordering safety (required)
      - ENABLE_PROCESSED_EVENT_REGISTRY=${ENABLE_PROCESSED_EVENT_REGISTRY:-true}
      - PROCESSED_EVENT_LEASE_TIMEOUT_SECONDS=${PROCESSED_EVENT_LEASE_TIMEOUT_SECONDS:-900}
      - PROCESSED_EVENT_HEARTBEAT_INTERVAL_SECONDS=${PROCESSED_EVENT_HEARTBEAT_INTERVAL_SECONDS:-30}
      # Worker tuning
      - ACTION_OUTBOX_POLL_SECONDS=${ACTION_OUTBOX_POLL_SECONDS:-2}
      - ACTION_OUTBOX_BATCH_SIZE=${ACTION_OUTBOX_BATCH_SIZE:-100}
      - LOG_LEVEL=INFO
      - DOCKER_CONTAINER=true
    depends_on:
      - kafka
      - postgres
      - minio
      - lakefs
    networks:
      - spice_network
    restart: unless-stopped

  # Writeback Materializer Worker (builds writeback_merged_snapshot to bound queue growth)
  writeback-materializer-worker:
    build:
      context: .
      dockerfile: ./writeback_materializer_worker/Dockerfile
    container_name: spice_writeback_materializer_worker
    environment:
      # Base storage (S3/MinIO)
