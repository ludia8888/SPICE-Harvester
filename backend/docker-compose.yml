      - minio
    networks:
      - spice_network
    restart: unless-stopped

  # Projection Worker - 표준화된 인증 정보
  projection-worker:
    build:
      context: .
      dockerfile: ./projection_worker/Dockerfile
    container_name: spice_projection_worker
    environment:
      - KAFKA_HOST=kafka
