    restart: unless-stopped

  # Dataset ingest reconciler worker (runs atomicity repair loop)
  ingest-reconciler-worker:
    build:
      context: .
      dockerfile: ./ingest_reconciler_worker/Dockerfile
    container_name: spice_ingest_reconciler_worker
    environment:
