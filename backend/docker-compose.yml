      - EVENT_PUBLISHER_POLL_INTERVAL=${EVENT_PUBLISHER_POLL_INTERVAL:-1}
      - EVENT_PUBLISHER_LOOKBACK_SECONDS=${EVENT_PUBLISHER_LOOKBACK_SECONDS:-600}
      - EVENT_PUBLISHER_LOOKBACK_MAX_KEYS=${EVENT_PUBLISHER_LOOKBACK_MAX_KEYS:-2000}
      - LOG_LEVEL=INFO
      - DOCKER_CONTAINER=true
    depends_on:
      - kafka
    networks:
      - spice_network
    restart: unless-stopped

  # Ontology Worker - 표준화된 인증 정보
  ontology-worker:
    build:
      context: .
      dockerfile: ./ontology_worker/Dockerfile
    container_name: spice_ontology_worker
    environment:
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
      - ONTOLOGY_RESOURCE_STORAGE_BACKEND=${ONTOLOGY_RESOURCE_STORAGE_BACKEND:-postgres}
