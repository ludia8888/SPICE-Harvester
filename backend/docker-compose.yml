  # Action Outbox Worker (reconciles ActionLog gaps: commit_written -> event_emitted -> succeeded)
  action-outbox-worker:
    build:
      context: .
      dockerfile: ./action_outbox_worker/Dockerfile
    container_name: spice_action_outbox_worker
    environment:
      # Kafka (publish ActionApplied events)
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
      # PostgreSQL (ActionLog + ProcessedEventRegistry)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-spiceadmin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spicepass123}
      - POSTGRES_DB=${POSTGRES_DB:-spicedb}
