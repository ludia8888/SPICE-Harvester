      - ENABLE_CHAOS_INJECTION=${ENABLE_CHAOS_INJECTION:-false}
      - CHAOS_CRASH_POINT=${CHAOS_CRASH_POINT:-}
      - CHAOS_CRASH_ONCE=${CHAOS_CRASH_ONCE:-true}
      - CHAOS_CRASH_EXIT_CODE=${CHAOS_CRASH_EXIT_CODE:-42}
      - LOG_LEVEL=INFO
      - DOCKER_CONTAINER=true
    depends_on:
