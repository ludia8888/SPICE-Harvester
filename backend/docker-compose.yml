    restart: unless-stopped

  # Action Worker (Action-only writeback execution)
  action-worker:
    build:
      context: .
      dockerfile: ./action_worker/Dockerfile
    container_name: spice_action_worker
    environment:
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
