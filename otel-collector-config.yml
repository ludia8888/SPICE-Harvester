receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  batch:

exporters:
  # Use OTLP/HTTP since Jaeger all-in-one reliably exposes OTLP on 4318.
  # This avoids gRPC DeadlineExceeded loops when OTLP gRPC is unavailable/misconfigured.
  otlphttp/jaeger:
    endpoint: http://jaeger:4318
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
