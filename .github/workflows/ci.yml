name: CI

on:
  push:
  pull_request:

jobs:
  backend-unit:
    name: Backend Unit
    uses: ./.github/workflows/backend-coverage.yml
    with:
      python-version: "3.11"
      make-target: backend-unit

  backend-coverage:
    name: Backend Coverage
    uses: ./.github/workflows/backend-coverage.yml
    with:
      python-version: "3.11"
      make-target: backend-coverage
      upload-coverage: true
      coverage-file: coverage.xml
      codecov-flags: backend
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  backend-runtime-ddl-audit:
    name: Backend Runtime DDL Audit
    uses: ./.github/workflows/backend-coverage.yml
    with:
      python-version: "3.11"
      make-target: backend-runtime-ddl-audit

  backend-error-taxonomy:
    name: Backend Error Taxonomy
    uses: ./.github/workflows/backend-coverage.yml
    with:
      python-version: "3.11"
      make-target: backend-error-taxonomy

  docs-check:
    name: Docs Auto-Generated Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify auto-generated docs
        run: python scripts/update_docs.py --check

  frontend-check:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  frontend-coverage:
    name: Frontend Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Test + Coverage
        working-directory: frontend
        run: npm run test

  backend-stack-tests:
    name: Backend Stack Tests
    uses: ./.github/workflows/backend-stack-tests.yml
    with:
      python-version: "3.11"
      script-args: "--full"
      timeout-seconds: 300

  backend-boundary-smoke:
    name: Backend Boundary Smoke
    uses: ./.github/workflows/backend-stack-tests.yml
    with:
      python-version: "3.11"
      make-target: backend-boundary-smoke
      timeout-seconds: 240

  backend-release-smoke:
    name: Backend Release Smoke
    uses: ./.github/workflows/backend-stack-tests.yml
    with:
      python-version: "3.11"
      make-target: backend-release-smoke
      timeout-seconds: 240

  backend-infra-tier:
    name: Backend Infra Tier
    uses: ./.github/workflows/backend-stack-tests.yml
    with:
      python-version: "3.11"
      make-target: backend-infra-tier
      timeout-seconds: 300

  backend-release-gate:
    name: Backend Release Gate
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - backend-runtime-ddl-audit
      - backend-error-taxonomy
      - backend-unit
      - backend-boundary-smoke
      - backend-release-smoke
      - backend-infra-tier
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write CI gate results
        run: |
          mkdir -p backend/.artifacts
          cat > backend/.artifacts/release_gate_ci_results.json <<'JSON'
          {
            "backend-runtime-ddl-audit": "${{ needs.backend-runtime-ddl-audit.result }}",
            "backend-error-taxonomy": "${{ needs.backend-error-taxonomy.result }}",
            "backend-unit": "${{ needs.backend-unit.result }}",
            "backend-boundary-smoke": "${{ needs.backend-boundary-smoke.result }}",
            "backend-release-smoke": "${{ needs.backend-release-smoke.result }}",
            "backend-infra-tier": "${{ needs.backend-infra-tier.result }}"
          }
          JSON

      - name: Evaluate release gate
        run: python backend/scripts/release_regression_gate.py --ci-results-json backend/.artifacts/release_gate_ci_results.json

      - name: Publish release gate summary
        if: ${{ always() }}
        run: |
          echo "## Backend Release Gate" >> "$GITHUB_STEP_SUMMARY"
          cat backend/.artifacts/release_regression_gate_report.json >> "$GITHUB_STEP_SUMMARY"

  docs-portal-build:
    name: Docs Portal Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            docs-portal/package-lock.json

      - name: Install
        working-directory: docs-portal
        run: npm ci

      - name: Build
        working-directory: docs-portal
        run: npm run build
