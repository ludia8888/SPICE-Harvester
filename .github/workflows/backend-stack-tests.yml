name: Backend Stack Tests (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.11"
      make-target:
        type: string
        default: ""
      script-args:
        type: string
        default: "--full"
      timeout-seconds:
        type: number
        default: 300
    secrets:
      ADMIN_TOKEN:
        required: false

jobs:
  stack-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # Use a deterministic token by default; override by passing secrets.ADMIN_TOKEN.
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN || 'ci_admin_token' }}
      SMOKE_ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN || 'ci_admin_token' }}
      TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      OPENAPI_STRICT_REMOVED_V1_OPS: "true"
      ALLOW_RUNTIME_DDL_BOOTSTRAP: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/shared/pyproject.toml

      - name: Install dependencies (backend/shared[test])
        run: |
          python -m pip install --upgrade pip
          pip install -e 'backend/shared[test]'

      - name: Check gRPC generated code drift
        run: |
          PYTHON=python scripts/grpc/generate_proto.sh
          git diff --exit-code backend/shared/generated/grpc

      - name: Start docker stack
        run: |
          docker compose -f docker-compose.full.yml -f backend/docker-compose.debug-ports.yml up -d --build
          docker compose -f docker-compose.full.yml -f backend/docker-compose.debug-ports.yml ps

      - name: Check SDK generated code drift
        run: |
          scripts/sdk/check_sdk_drift.sh

      - name: Run stack verification target
        run: |
          if [ -n "${{ inputs.make-target }}" ]; then
            make PYTHON=python ${{ inputs.make-target }}
          else
            PYTHON_BIN=python ./backend/run_production_tests.sh ${{ inputs.script-args }}
          fi

      - name: Run API duplicate/legacy contract audit (strict)
        run: |
          python scripts/api_audit -m phase1 --services bff,oms,agent --include-hidden --strict
          python scripts/api_audit -m phase2 --input docs/reference/_generated/API_DUPLICATE_LEGACY_INVENTORY.json --risk high --strict --strict-contract

      - name: Dump docker logs (on failure)
        if: failure()
        run: |
          docker compose -f docker-compose.full.yml -f backend/docker-compose.debug-ports.yml ps
          docker compose -f docker-compose.full.yml -f backend/docker-compose.debug-ports.yml logs --no-color --timestamps | tail -n 5000

      - name: Stop docker stack
        if: always()
        run: |
          docker compose -f docker-compose.full.yml -f backend/docker-compose.debug-ports.yml down --remove-orphans
