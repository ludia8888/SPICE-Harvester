repos:
  - repo: local
    hooks:
      - id: docs-autogen-check
        name: Docs Auto-Generated Check
        entry: .venv-docs/bin/python scripts/update_docs.py --check
        language: system
        pass_filenames: false
        always_run: true
        description: "Fail commit if auto-generated docs are stale"

      - id: docs-sphinx-check
        name: Docs Sphinx Check
        entry: .venv-docs/bin/python scripts/check_docs.py
        language: system
        pass_filenames: false
        always_run: true
        description: "Fail commit on Sphinx warnings/errors"

      - id: portal-autogen-check
        name: Portal Auto-Generated Check
        entry: .venv-docs/bin/python scripts/generate_portal_content.py --check
        language: system
        pass_filenames: false
        always_run: true
        description: "Fail commit if portal auto-generated content is stale"
